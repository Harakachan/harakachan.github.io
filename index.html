const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const fmtTime = (s) => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;

// --- Pixel-art renderer -----------------------------------------------------
function PixelArt({ art, palette, scale = 8 }) {
  const cols = art[0].length;
  return (
    <div style={{
      display: "grid",
      gridTemplateColumns: `repeat(${cols}, ${scale}px)`,
      gridTemplateRows: `repeat(${art.length}, ${scale}px)`,
      imageRendering: "pixelated",
    }}>
      {art.flatMap((row, y) =>
        row.split("").map((ch, x) => (
          <div key={`${x}-${y}`} style={{ width: scale, height: scale, backgroundColor: palette[ch] || "transparent" }} />
        ))
      )}
    </div>
  );
}

// --- UI atoms ---------------------------------------------------------------
function PixelButton({ children, onClick, disabled, className = "", color = "#7FB069", text = "#FFFFFF" }) {
  return (
    <button onClick={onClick} disabled={disabled}
      className={`pixel-btn pixel-font text-[11px] leading-tight px-4 py-3 rounded-md select-none ${className}`}
      style={{ backgroundColor: disabled ? "#C9C2B6" : color, color: disabled ? "#FFFFFF" : text }}>
      {children}
    </button>
  );
}
function Card({ children, className = "" }) {
  return <div className={`pixel-box bg-card border-2 border-line rounded-xl p-4 ${className}`}>{children}</div>;
}
function HPBar({ hp, max }) {
  const pct = Math.max(0, (hp / max) * 100);
  return (
    <div className="w-full">
      <div className="flex items-center justify-between mb-1">
        <span className="pixel-font text-[9px] text-muted2 flex items-center gap-1">
          <Icon name="heart" size={11} className="text-[#E88A8A]" /> HP
        </span>
        <span className="pixel-font text-[9px] text-muted2">{Math.max(0, hp)}/{max}</span>
      </div>
      <div className="h-4 w-full rounded-md border-2 border-ink bg-panel overflow-hidden">
        <div className="h-full transition-all duration-500" style={{
          width: `${pct}%`,
          background: "repeating-linear-gradient(45deg,#E88A8A,#E88A8A 6px,#f0a0a0 6px,#f0a0a0 12px)",
        }} />
      </div>
    </div>
  );
}
function Modal({ children, onClose, hideClose }) {
  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
      <div className="relative w-full max-w-sm">
        {!hideClose && (
          <button onClick={onClose} className="absolute -top-2 -right-2 z-10 bg-card text-ink border-2 border-ink rounded-md p-1 pixel-btn">
            <Icon name="x" size={16} />
          </button>
        )}
        <div className="pixel-box bg-surface text-ink border-2 border-ink rounded-xl p-5 max-h-[88vh] overflow-y-auto">
          {children}
        </div>
      </div>
    </div>
  );
}
function Stat({ iconName, label, value, color }) {
  return (
    <div className="pixel-box bg-card border-2 border-line rounded-xl p-3 text-center">
      <div className="flex justify-center mb-1"><Icon name={iconName} size={16} style={{ color }} /></div>
      <p className="pixel-font text-[10px]">{value}</p>
      <p className="text-[9px] text-muted mt-0.5">{label}</p>
    </div>
  );
}
function Toggle({ on, onChange }) {
  return (
    <button onClick={onChange}
      className={`w-12 h-7 rounded-full border-2 transition-colors relative ${on ? "bg-[#7FB069] border-[#7FB069]" : "bg-line border-line2"}`}>
      <span className={`absolute top-0.5 w-5 h-5 bg-white rounded-full transition-all ${on ? "left-5" : "left-0.5"}`} />
    </button>
  );
}
function ShopRow({ title, desc, cost, owned, gold, onBuy, color }) {
  const canAfford = gold >= cost;
  return (
    <div className="flex items-center gap-3 bg-surface border-2 border-line rounded-lg p-2.5">
      <div className="flex-1">
        <p className="text-[12px] font-semibold">{title}</p>
        <p className="text-[10px] text-muted">{desc}</p>
      </div>
      {owned ? (
        <span className="pixel-font text-[8px] text-[#7FB069] flex items-center gap-1"><Icon name="check" size={11} /> OWNED</span>
      ) : cost === 0 ? (
        <span className="pixel-font text-[8px] text-muted">FREE</span>
      ) : (
        <button onClick={onBuy} disabled={!canAfford}
          className="pixel-btn rounded-md px-3 py-1.5 text-white pixel-font text-[8px] flex items-center gap-1"
          style={{ backgroundColor: canAfford ? color : "#C9C2B6" }}>
          <Icon name="coins" size={11} /> {cost}
        </button>
      )}
    </div>
  );
}

// ============================================================================
function App() {
  const [view, setView] = useState("home");
  const [dark, setDark] = useState(false);

  const [reminderQuestion, setReminderQuestion] = useState("Is this who you truly want to be?");
  const [targetGoal, setTargetGoal] = useState("HKU — Quantitative Finance");
  const [prideEmoji, setPrideEmoji] = useState("🎓");

  const [gold, setGold] = useState(10);
  const [weaponLevel, setWeaponLevel] = useState(1);
  const [armorLevel, setArmorLevel] = useState(1);
  const [boss, setBoss] = useState({ stage: 1, hp: BOSS_HP[1], maxHp: BOSS_HP[1] });
  const [coopBuff, setCoopBuff] = useState(false);

  const [focusRunning, setFocusRunning] = useState(false);
  const [focusElapsed, setFocusElapsed] = useState(0);
  const [hitFlash, setHitFlash] = useState(false);
  const [lastHit, setLastHit] = useState({ id: 0, dmg: 0 }); // drives battle attack animation

  const [toast, setToast] = useState(null);
  const [gate, setGate] = useState(null);
  const [review, setReview] = useState(null);
  const [devOpen, setDevOpen] = useState(false);
  const [lbTab, setLbTab] = useState("friends");

  // Apply theme class + transition to <html>
  useEffect(() => {
    const root = document.documentElement;
    root.classList.toggle("dark", dark);
    root.classList.add("theme-transition");
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute("content", dark ? "#121218" : "#FAF7F2");
  }, [dark]);

  const showToast = (msg, type = "info") => setToast({ msg, type, id: Date.now() });
  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 2600);
    return () => clearTimeout(t);
  }, [toast]);

  const flashHit = () => { setHitFlash(true); setTimeout(() => setHitFlash(false), 350); };

  const focusTick = () => {
    const base = WEAPON[weaponLevel].dmg;
    const dmg = coopBuff ? base * 2 : base;
    setGold((g) => g + 1);
    flashHit();
    setLastHit({ id: Date.now(), dmg }); // trigger knight attack animation
    const newHp = boss.hp - dmg;
    if (newHp > 0) {
      setBoss({ ...boss, hp: newHp });
      showToast(`Hit! −${dmg} HP · +1 Gold${coopBuff ? " (2× co-op!)" : ""}`, "good");
    } else if (boss.stage < 5) {
      const ns = boss.stage + 1;
      setBoss({ stage: ns, hp: BOSS_HP[ns], maxHp: BOSS_HP[ns] });
      setGold((g) => g + 5);
      showToast(`${BOSS_NAMES[boss.stage]} defeated! +5 bonus. Stage ${ns} begins!`, "good");
    } else {
      setBoss({ stage: 1, hp: BOSS_HP[1], maxHp: BOSS_HP[1] });
      setGold((g) => g + 10);
      showToast("You beat The Distraction Dragon — you are FREE! A new run begins.", "good");
    }
  };

  const bossCounterAttack = (reason = "Focus broken") => {
    const [min, max] = ARMOR[armorLevel].range;
    const loss = rand(min, max);
    setGold((g) => Math.max(0, g - loss));
    flashHit();
    showToast(`${reason}! ${BOSS_NAMES[boss.stage]} counter-attacks — −${loss} Gold`, "bad");
  };

  useEffect(() => {
    if (!focusRunning) return;
    const id = setInterval(() => setFocusElapsed((e) => e + 1), 1000);
    return () => clearInterval(id);
  }, [focusRunning]);

  useEffect(() => {
    if (focusElapsed > 0 && focusElapsed % 300 === 0) focusTick();
  }, [focusElapsed]);

  const startFocus = () => { setFocusRunning(true); showToast("Focus session started. Stay with it!", "good"); };
  const giveUpFocus = () => { setFocusRunning(false); setFocusElapsed(0); bossCounterAttack("You gave up early"); };

  const isAligned = (reason) => {
    const text = (reason || "").toLowerCase();
    if (text.trim().length === 0) return false;
    const goalWords = targetGoal.toLowerCase().split(/[^a-z]+/).filter((w) => w.length > 3);
    return STUDY_KEYWORDS.some((k) => text.includes(k)) || goalWords.some((k) => text.includes(k));
  };

  const openGate = (app) => setGate({ app, reason: "", durationValue: 15, durationUnit: "min", step: "form", friction: 15 });

  useEffect(() => {
    if (!gate || gate.step !== "friction" || gate.friction <= 0) return;
    const id = setInterval(() => setGate((g) => (g ? { ...g, friction: Math.max(0, g.friction - 1) } : g)), 1000);
    return () => clearInterval(id);
  }, [gate && gate.step, gate && gate.friction]);

  const submitGateForm = () => {
    if (!gate.reason.trim()) return showToast("Please type your purpose first.", "bad");
    if (isAligned(gate.reason)) setGate({ ...gate, step: "inapp" });
    else setGate({ ...gate, step: "friction", friction: 15 });
  };
  const proceedToApp = () => setGate({ ...gate, step: "inapp" });
  const expireSession = () => { const app = gate.app; setGate(null); setReview({ app, step: "q1", extend: 30 }); };

  const buyWeapon = (lvl) => {
    const cost = WEAPON[lvl].cost;
    if (weaponLevel >= lvl) return;
    if (gold < cost) return showToast("Not enough gold.", "bad");
    setGold((g) => g - cost); setWeaponLevel(lvl);
    showToast(`Weapon upgraded to Lv.${lvl} — ${WEAPON[lvl].dmg} DMG / 5 min!`, "good");
  };
  const buyArmor = (lvl) => {
    const cost = ARMOR[lvl].cost;
    if (armorLevel >= lvl) return;
    if (gold < cost) return showToast("Not enough gold.", "bad");
    setGold((g) => g - cost); setArmorLevel(lvl);
    showToast(`Armor upgraded to Lv.${lvl} — penalty now ${ARMOR[lvl].range[0]}-${ARMOR[lvl].range[1]} gold.`, "good");
  };

  // Sprite outline ('D') flips with theme via the ink token.
  // Eyes are driven straight off the `dark` state so a toggle forces a real
  // re-render: white sclera + dark pupil in light mode → glowing RED eyes in dark mode.
  const bossPalette = {
    D: "var(--c-ink)",
    B: BOSS_BODY[boss.stage],
    E: dark ? "#FF5A5A" : "#FFFFFF",
    P: dark ? "#8E1B1B" : "#3B3B4F",
    M: "#5A2B2B",
  };

  const toastStyle = (type) => ({
    backgroundColor: type === "bad" ? "var(--c-badbg)" : type === "good" ? "var(--c-okbg)" : "var(--c-card)",
    borderColor: type === "bad" ? "#E88A8A" : type === "good" ? "#7FB069" : "var(--c-line)",
  });

  return (
    <div className="min-h-screen w-full bg-base flex justify-center text-ink"
         style={{ fontFamily: "ui-sans-serif, system-ui, sans-serif" }}>
      <div className="relative w-full max-w-md min-h-screen bg-surface flex flex-col shadow-2xl">

        <header className="sticky top-0 z-20 bg-surface2 border-b-2 border-line px-4 py-3 flex items-center justify-between">
          <div className="pixel-font text-[13px] text-[#7FB069]">Re<span className="text-ink">Focus</span></div>
          <div className="flex items-center gap-2">
            <button onClick={() => setDark((d) => !d)} title="Toggle dark mode"
              className="bg-card text-ink border-2 border-line rounded-full p-1.5 pixel-btn">
              <Icon name={dark ? "sun" : "moon"} size={14} className="text-[#E6B84F]" />
            </button>
            <div className="flex items-center gap-1 bg-card border-2 border-line rounded-full px-2 py-1">
              <Icon name="coins" size={14} className="text-[#E6B84F]" /><span className="pixel-font text-[10px]">{gold}</span>
            </div>
            <div className="flex items-center gap-1 bg-card border-2 border-line rounded-full px-2 py-1">
              <Icon name="crown" size={14} className="text-[#C3A0E8]" /><span className="pixel-font text-[10px]">S{boss.stage}</span>
            </div>
          </div>
        </header>

        <main className="flex-1 overflow-y-auto px-4 py-4 pb-28">
          {view === "home" && <HomeView {...{ targetGoal, prideEmoji, boss, bossPalette, gold, weaponLevel, armorLevel, coopBuff, setCoopBuff, setView, openGate }} />}
          {view === "focus" && <FocusView {...{ boss, bossPalette, focusRunning, focusElapsed, hitFlash, coopBuff, weaponLevel, startFocus, giveUpFocus }} />}
          {view === "battle" && <BattleView {...{ boss, bossPalette, hitFlash, gold, weaponLevel, armorLevel, coopBuff, buyWeapon, buyArmor }} />}
          {view === "leaderboard" && <LeaderboardView lbTab={lbTab} setLbTab={setLbTab} />}
          {view === "settings" && <SettingsView {...{ reminderQuestion, setReminderQuestion, targetGoal, setTargetGoal, prideEmoji, setPrideEmoji, coopBuff, setCoopBuff, dark, setDark }} />}
        </main>

        <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-surface2 border-t-2 border-line flex justify-around px-2 py-2 z-20">
          {[
            { id: "home", label: "Home", icon: "home" },
            { id: "focus", label: "Focus", icon: "clock" },
            { id: "battle", label: "Battle", icon: "swords" },
            { id: "leaderboard", label: "Ranks", icon: "trophy" },
            { id: "settings", label: "Setup", icon: "settings" },
          ].map(({ id, label, icon }) => (
            <button key={id} onClick={() => setView(id)}
              className={`flex flex-col items-center gap-1 px-2 py-1 rounded-lg ${view === id ? "bg-[#7FB069] text-white" : "text-muted"}`}>
              <Icon name={icon} size={18} /><span className="pixel-font text-[7px]">{label}</span>
            </button>
          ))}
        </nav>

        <DevPanel open={devOpen} setOpen={setDevOpen}
          onTick={focusTick}
          onEarlyExit={() => { setFocusRunning(false); setFocusElapsed(0); bossCounterAttack("Simulated early exit"); }}
          onDistract={() => openGate(APPS[0])} />

        {toast && (
          <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-[70] w-[90%] max-w-sm">
            <div className="pixel-box border-2 rounded-lg px-4 py-3 text-center pixel-font text-[9px] leading-relaxed text-ink" style={toastStyle(toast.type)}>{toast.msg}</div>
          </div>
        )}

        {gate && (
          <Modal onClose={() => setGate(null)} hideClose={gate.step === "friction"}>
            <GateContent gate={gate} setGate={setGate} reminderQuestion={reminderQuestion} prideEmoji={prideEmoji}
              targetGoal={targetGoal} aligned={isAligned(gate.reason)} onSubmit={submitGateForm} onProceed={proceedToApp}
              onExpire={expireSession} onLeave={() => { showToast("Good call — you chose your goal. 💪", "good"); setGate(null); }} />
          </Modal>
        )}

        {review && (
          <Modal onClose={() => setReview(null)} hideClose>
            <ReviewContent review={review} setReview={setReview} onDone={(msg) => { setReview(null); showToast(msg, "good"); }} />
          </Modal>
        )}

        {focusRunning && (
          <FocusBattle boss={boss} bossPalette={bossPalette} coopBuff={coopBuff} weaponLevel={weaponLevel}
            focusElapsed={focusElapsed} lastHit={lastHit} onGiveUp={giveUpFocus} />
        )}
      </div>
    </div>
  );
}

/* ============================== VIEWS ====================================== */

  return (
    <div className="space-y-4">
      <div>
        <p className="text-sm text-muted">Welcome back,</p>
        <h1 className="text-xl font-bold">Stay focused today ✨</h1>
      </div>

      <Card className="bg-gradient-to-br from-card to-surface2">
        <div className="flex items-center gap-3">
          <div className="w-12 h-12 rounded-lg bg-panel border-2 border-line flex items-center justify-center text-2xl">{prideEmoji}</div>
          <div className="flex-1">
            <p className="pixel-font text-[8px] text-muted mb-1 flex items-center gap-1"><Icon name="target" size={10} /> YOUR GOAL</p>
            <p className="text-sm font-semibold leading-tight">{targetGoal}</p>
          </div>
        </div>
      </Card>

      <Card>
        <div className="flex items-center justify-between mb-3">

          <PixelButton onClick={() => setView("battle")} color="#C3A0E8"><span className="flex items-center justify-center gap-1"><Icon name="swords" size={12} /> Battle</span></PixelButton>

      <div className="grid grid-cols-3 gap-2">
        <Stat iconName="coins" label="Gold" value={gold} color="#E6B84F" />
        <Stat iconName="sword" label="Weapon" value={`Lv.${weaponLevel}`} color="#7FB069" />
        <Stat iconName="shield" label="Armor" value={`Lv.${armorLevel}`} color="#8FB7E8" />
      </div>

      <Card>
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2">
            <Icon name="users" size={18} className="text-[#E4567D]" />
            <div>
              <p className="text-sm font-semibold">Co-op Synergy</p>
              <p className="text-[11px] text-muted">Friend focusing too → 2× damage</p>

          </div>

        </div>
      </Card>

      <Card>
        <p className="pixel-font text-[9px] mb-3 flex items-center gap-1"><Icon name="smartphone" size={12} /> DISTRACTING APPS</p>

        <div className="flex gap-3">
          {APPS.map((a) => (
            <button key={a.id} onClick={() => openGate(a)} className="flex flex-col items-center gap-1 pixel-btn rounded-xl p-2 bg-card">
              <div className="w-12 h-12 rounded-xl flex items-center justify-center" style={{ backgroundColor: a.color }}>
                <Icon name={a.icon} size={24} className="text-white" />
              </div>
              <span className="text-[10px] text-sub">{a.name}</span>
            </button>
          ))}
        </div>
      </Card>
    </div>
  );
}

function FocusView({ boss, bossPalette, focusRunning, focusElapsed, hitFlash, coopBuff, weaponLevel, startFocus, giveUpFocus }) {
  const nextTick = 300 - (focusElapsed % 300);
  const dmg = (coopBuff ? 2 : 1) * WEAPON[weaponLevel].dmg;
  return (
    <div className="space-y-4">
      <h2 className="text-lg font-bold flex items-center gap-2"><Icon name="clock" size={18} className="text-[#7FB069]" /> Focus Room</h2>
      <Card className="text-center">
        <div className={`flex justify-center mb-3 ${hitFlash ? "shake" : "floaty"}`}><PixelArt art={BOSS_SPRITE} palette={bossPalette} scale={9} /></div>
        <p className="pixel-font text-[10px] mb-1">{BOSS_NAMES[boss.stage]}</p>
        <div className="px-6 mb-4"><HPBar hp={boss.hp} max={boss.maxHp} /></div>
        <div className="pixel-font text-3xl mb-1">{fmtTime(focusElapsed)}</div>
        <p className="text-[11px] text-muted mb-4">{focusRunning ? `Next hit in ${fmtTime(nextTick)} · deals ${dmg} DMG` : "Press start to begin focusing"}</p>
        {coopBuff && (
          <div className="inline-flex items-center gap-1 mb-4 bg-pinkbg border-2 border-[#E4567D] rounded-full px-3 py-1">
            <Icon name="users" size={12} className="text-[#E4567D]" /><span className="pixel-font text-[8px] text-[#E4567D]">2× CO-OP ACTIVE</span>
          </div>
        )}
        {!focusRunning ? (
          <PixelButton onClick={startFocus} color="#7FB069" className="w-full"><span className="flex items-center justify-center gap-2"><Icon name="play" size={14} /> Start Focus Session</span></PixelButton>
        ) : (
          <PixelButton onClick={giveUpFocus} color="#E88A8A" className="w-full"><span className="flex items-center justify-center gap-2"><Icon name="flag" size={14} /> Give Up (penalty!)</span></PixelButton>
        )}
      </Card>
      <Card>
        <p className="pixel-font text-[9px] mb-2 flex items-center gap-1"><Icon name="sparkles" size={12} className="text-[#E6B84F]" /> HOW IT WORKS</p>
        <ul className="text-[12px] text-sub space-y-1 list-disc pl-4">
          <li>Every <b>5 minutes</b> of focus = <b>{WEAPON[weaponLevel].dmg} HP</b> damage + <b>1 Gold</b>.</li>
          <li>Co-op buff doubles your damage output.</li>
          <li>Giving up early lets the boss counter-attack your gold.</li>
        </ul>
        <p className="text-[10px] text-faint mt-2">Tip: use the Dev panel (bottom-right 🔧) to simulate time instantly.</p>
      </Card>
    </div>
  );
}

function BattleView({ boss, bossPalette, hitFlash, gold, weaponLevel, armorLevel, coopBuff, buyWeapon, buyArmor }) {
  const dmg = (coopBuff ? 2 : 1) * WEAPON[weaponLevel].dmg;
  return (
    <div className="space-y-4">
      <h2 className="text-lg font-bold flex items-center gap-2"><Icon name="swords" size={18} className="text-[#C3A0E8]" /> Boss & Shop</h2>
      <Card className="text-center bg-gradient-to-b from-card to-surface2">
        <div className="flex items-center justify-center gap-1 mb-2">
          {[1,2,3,4,5].map((s) => (<div key={s} className={`w-2 h-2 rounded-sm border ${s <= boss.stage ? "bg-[#C3A0E8] border-[#C3A0E8]" : "bg-transparent border-line2"}`} />))}
        </div>
        <div className={`flex justify-center my-3 ${hitFlash ? "shake" : "floaty"}`}><PixelArt art={BOSS_SPRITE} palette={bossPalette} scale={11} /></div>
        <p className="pixel-font text-[11px] mb-1">{BOSS_NAMES[boss.stage]}</p>
        <p className="text-[10px] text-muted mb-3">Stage {boss.stage} of 5</p>
        <div className="px-4"><HPBar hp={boss.hp} max={boss.maxHp} /></div>
        <div className="mt-3 inline-flex items-center gap-1 bg-panel rounded-full px-3 py-1"><Icon name="zap" size={12} className="text-[#E6B84F]" /><span className="pixel-font text-[8px]">{dmg} DMG / 5 min</span></div>
      </Card>

      <Card>
        <div className="flex items-center gap-2 mb-3"><Icon name="sword" size={16} className="text-[#7FB069]" /><p className="pixel-font text-[10px]">WEAPONS</p><span className="ml-auto pixel-font text-[8px] text-muted">Equipped: Lv.{weaponLevel}</span></div>

          animationDelay: `${i * 0.5}s`,
        }} />
      ))}

      {/* BOSS */}
      <div className="absolute left-1/2 -translate-x-1/2 flex flex-col items-center" style={{ top: "22%" }}>
        <div style={{ animation: "bossFloatBig 3s ease-in-out infinite" }}>
          <div key={"b" + atk} className="relative" style={{ animation: "bossHit .5s ease, bossFlash .45s ease" }}>
            <PixelArt art={BOSS_SPRITE} palette={bossPalette} scale={12} />
            {/* hit FX: shock ring + slash + sparks */}
            <div key={"fx" + atk} className="absolute inset-0 pointer-events-none flex items-center justify-center">
              <div style={{ position: "absolute", width: 96, height: 96, border: "5px solid rgba(255,255,255,.92)", borderRadius: "50%", animation: "burstRing .5s ease forwards" }} />

              <div style={{ position: "absolute", width: 96, height: 7, borderRadius: 4, background: "linear-gradient(90deg,transparent,#fff,transparent)", animation: "slashArc .45s ease forwards" }} />
              {[...Array(7)].map((_, i) => {
                const ang = (i / 7) * Math.PI * 2;
                return (
                  <div key={i} style={{
                    position: "absolute", width: 6, height: 6, borderRadius: 1,
                    background: i % 2 ? "#FFE15A" : "#FFFFFF",
                    "--dx": `${Math.cos(ang) * 62}px`, "--dy": `${Math.sin(ang) * 62}px`,
                    animation: "sparkFly .55s ease forwards",

                );
              })}
            </div>
            {/* floating damage number */}
            <div key={"d" + atk} className="absolute left-1/2 -translate-x-1/2 pointer-events-none" style={{ top: -10, animation: "dmgFloat 1s ease forwards" }}>
              <span className="pixel-font text-[18px]" style={{ color: "#FFE15A", textShadow: "2px 2px 0 #B23B3B" }}>-{lastHit.dmg || strike}</span>
            </div>
          </div>
        </div>
        <div style={{ width: 96, height: 18, marginTop: 8, background: "rgba(0,0,0,.22)", borderRadius: "50%", filter: "blur(2px)" }} />
      </div>

      {/* KNIGHT */}
      <div className="absolute left-1/2 flex flex-col items-center" style={{ top: "50%", transform: "translateX(-50%)" }}>
        <div key={"k" + atk} className="relative" style={{ animation: "kLunge .55s ease" }}>
          {/* round shield on the left arm */}
          <div style={{ position: "absolute", left: -12, top: 42, transform: "rotate(-14deg)", zIndex: 3, filter: "drop-shadow(1px 2px 0 rgba(0,0,0,.3))" }}>
            <PixelArt art={SHIELD_SPRITE} palette={SHIELD_PAL} scale={4} />
          </div>
          {/* animated sword in the right hand */}
          <div style={{ position: "absolute", right: -16, top: 14, width: 9, height: 48, transformOrigin: "bottom center", transform: "rotate(38deg)", animation: "swordSwing .55s ease", zIndex: 4 }}>
            <div style={{ position: "absolute", bottom: 0, left: 1, width: 7, height: 6, background: "#E6B84F", borderRadius: 2 }} />
            <div style={{ position: "absolute", bottom: 5, left: 2, width: 5, height: 9, background: "#7A5A33" }} />
            <div style={{ position: "absolute", bottom: 13, left: -3, width: 15, height: 4, background: "#E6B84F", borderRadius: 1 }} />
            <div style={{ position: "absolute", bottom: 16, left: 1, width: 7, height: 32, background: "linear-gradient(180deg,#FFFFFF,#C8CDD6 60%,#9AA0AD)", clipPath: "polygon(50% 0,100% 16%,100% 100%,0 100%,0 16%)" }} />
            <div style={{ position: "absolute", bottom: 18, left: 3.5, width: 2, height: 26, background: "rgba(255,255,255,.85)" }} />
          </div>
          <div style={{ animation: "idleBob 2.4s ease-in-out infinite" }}>
            <PixelArt art={KNIGHT_SPRITE} palette={KNIGHT_PAL} scale={6} />
          </div>
        </div>
        <div style={{ width: 64, height: 13, marginTop: 4, background: "rgba(0,0,0,.22)", borderRadius: "50%", filter: "blur(2px)" }} />
      </div>

      {/* HUD (timer / HP / gold — same scoring as before) */}
      <div className="absolute top-0 inset-x-0 px-3 pt-3 flex flex-col items-center gap-2">
        <div className="w-full max-w-md flex items-center justify-between">
          <div className="flex items-center gap-1 bg-black/40 backdrop-blur rounded-full px-3 py-1.5 text-white"><Icon name="coins" size={13} className="text-[#FFE15A]" /><span className="pixel-font text-[9px]">+1 / strike</span></div>
          <div className="flex items-center gap-1 bg-black/40 backdrop-blur rounded-full px-3 py-1.5 text-white"><Icon name="zap" size={13} className="text-[#FFE15A]" /><span className="pixel-font text-[9px]">{strike} DMG</span></div>
        </div>
        <div className="bg-black/45 backdrop-blur rounded-2xl px-6 py-2 text-center text-white shadow-lg">
          <div className="pixel-font text-[8px] tracking-wide opacity-80">FOCUSING · STAGE {boss.stage}</div>
          <div className="pixel-font text-3xl my-1">{fmtTime(focusElapsed)}</div>
          <div className="text-[10px] opacity-80">Next strike in {fmtTime(nextTick)}</div>
          {coopBuff && <div className="text-[9px] mt-1" style={{ color: "#FFD0E0" }}>★ 2× Co-op active</div>}
        </div>
        <div className="w-full max-w-xs bg-black/35 backdrop-blur rounded-lg px-3 py-2">
          <div className="flex justify-between text-white pixel-font text-[8px] mb-1"><span>{BOSS_NAMES[boss.stage]}</span><span>{Math.max(0, boss.hp)}/{boss.maxHp}</span></div>
          <div className="h-3 rounded border-2 border-white/70 overflow-hidden bg-black/30">
            <div className="h-full transition-all duration-500" style={{ width: `${pct}%`, background: "repeating-linear-gradient(45deg,#E88A8A,#E88A8A 6px,#f0a0a0 6px,#f0a0a0 12px)" }} />
          </div>
        </div>
      </div>

      {/* exit */}
      <div className="absolute bottom-6 inset-x-0 flex flex-col items-center gap-2">
        <p className="text-white/80 text-[9px] pixel-font text-center px-6">Leaving early lets the boss counter-attack!</p>
        <PixelButton onClick={onGiveUp} color="#E88A8A"><span className="flex items-center gap-2"><Icon name="flag" size={13} /> Give Up</span></PixelButton>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
